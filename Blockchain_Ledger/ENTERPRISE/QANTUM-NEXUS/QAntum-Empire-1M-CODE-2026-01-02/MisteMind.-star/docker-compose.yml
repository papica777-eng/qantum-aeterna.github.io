version: '3.8'

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║           QANTUM v9.0 - Docker Compose                               ║
# ║           Complete QA Automation Stack                                     ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

services:
  # ==========================================================================
  # QANTUM - Main Application
  # ==========================================================================
  qantum:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qantum
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://ollama:11434
      - HEADLESS=true
    volumes:
      - ./output:/app/output
      - ./screenshots:/app/screenshots
      - ./Report:/app/Report
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - qantum-network

  # ==========================================================================
  # OLLAMA - Local AI Engine
  # ==========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: qantum-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - qantum-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ==========================================================================
  # SELENIUM HUB - Browser Grid
  # ==========================================================================
  selenium-hub:
    image: selenium/hub:4.15
    container_name: qantum-selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    environment:
      - GRID_MAX_SESSION=5
      - GRID_BROWSER_TIMEOUT=300
      - GRID_TIMEOUT=300
    restart: unless-stopped
    networks:
      - qantum-network

  chrome:
    image: selenium/node-chrome:4.15
    container_name: qantum-chrome
    shm_size: '2gb'
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    restart: unless-stopped
    networks:
      - qantum-network

  # ==========================================================================
  # NGINX - Reverse Proxy (Optional)
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: qantum-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - qantum
    restart: unless-stopped
    networks:
      - qantum-network
    profiles:
      - production

# ==========================================================================
# VOLUMES
# ==========================================================================
volumes:
  ollama-data:
    driver: local

# ==========================================================================
# NETWORKS
# ==========================================================================
networks:
  qantum-network:
    driver: bridge
