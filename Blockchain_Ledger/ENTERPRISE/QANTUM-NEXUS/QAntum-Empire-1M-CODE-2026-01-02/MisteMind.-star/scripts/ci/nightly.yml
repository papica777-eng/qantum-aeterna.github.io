name: QANTUM - Nightly Tests

on:
  schedule:
    # Run every day at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'

jobs:
  nightly-regression:
    name: 🌙 Nightly Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
      
      - name: Run full regression suite
        run: npm run test:regression --if-present
        env:
          HEADLESS: true
          TEST_TIMEOUT: 30000
      
      - name: Generate report
        if: always()
        run: npm run report:generate --if-present
      
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-report-${{ github.run_number }}
          path: Report/
          retention-days: 30
      
      - name: Send notification on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '🚨 Nightly regression tests failed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  visual-regression:
    name: 👁️ Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run visual regression
        run: npm run test:visual --if-present
        env:
          HEADLESS: true
      
      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-${{ github.run_number }}
          path: visual_diffs/
          retention-days: 14

  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run performance tests
        run: npm run test:perf --if-present
      
      - name: Upload performance report
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-${{ github.run_number }}
          path: performance/
          retention-days: 30
