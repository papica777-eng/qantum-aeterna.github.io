services:
  - type: web
    name: aeterna-qantum-nexus
    env: node
    plan: pro
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aeterna-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: NODE_OPTIONS
        value: "--max-old-space-size=2048"
    healthCheckPath: /health

databases:
  - name: aeterna-db
    type: postgres
    plan: standard
