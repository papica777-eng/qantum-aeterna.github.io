<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Aeterna Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --accent-blue: #00ffff;
            --glass-bg: rgba(10, 10, 15, 0.7);
            --glass-border: rgba(0, 255, 255, 0.15);
        }
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 255, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 150, 255, 0.05), transparent 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .success-icon {
            color: #00ff88;
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        .btn-glow {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
        }
        .btn-glow:hover {
            background: var(--accent-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="success-icon">✓</div>
        <h1 class="text-3xl font-bold mb-4">PAYMENT SUCCESSFUL</h1>
        <p class="text-gray-300 mb-6">
            Transaction verified onto the blockchain ledger. Your API keys and data access have been unlocked.
        </p>
        <p class="mono">[AETERNA_NEXUS] Routing liquidity & fulfilling request...</p>
        <a href="/" class="btn-glow">RETURN TO PORTAL</a>
    </div>

</body>
</html>
